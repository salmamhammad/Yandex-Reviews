services:
  mysql:
    image: mysql:8.0
    container_name: yandex_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  php:
    build:
      context: ./backend
    container_name: yandex_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./backend/php.ini:/usr/local/etc/php/php.ini
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - app-network

  vue-builder:
    build:
      context: ./frontend
    container_name: yandex_vue_builder
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: yandex_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - frontend_dist:/var/www/frontend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - vue-builder
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  frontend_dist: