services:
  mysql:
    image: mysql:8.0
    container_name: yandex_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  php:
    build: ./backend
    container_name: yandex_php
    volumes:
      - ./backend:/var/www/html
      - ./backend/php.ini:/usr/local/etc/php/php.ini
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - app-network
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 10 &&
      php artisan key:generate --force &&
      php artisan migrate --force &&
      php artisan db:seed --force 
      "

  nginx:
    image: nginx:alpine
    container_name: yandex_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/frontend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - vue-builder
    networks:
      - app-network

  vue-builder:
    build: ./frontend
    container_name: yandex_vue_builder
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
